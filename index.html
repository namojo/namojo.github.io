<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엔지니어를 위한 이야기 공장 — 조남호 (namojo)</title>
    <meta name="description" content="AI 기술에 인문학의 온기를 불어넣다. 2024년부터 기록해온 AI 뉴스 평론과 인문학적 IT기술론." />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Pretendard (Apple SF Pro 대체, 한글 최적) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <!-- Noto Serif KR (장문 본문용) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              // Pretendard: Apple SF Pro 스타일 + 한글 완벽 지원
              sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'sans-serif'],
              display: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              // Noto Serif KR: 장문 본문 가독성
              serif: ['Noto Serif KR', 'Apple SD Gothic Neo', 'Nanum Myeongjo', 'serif'],
            },
            fontSize: {
              // Apple 스케일: 큰 헤드라인이 정체성
              'display-xl': ['4.5rem', { lineHeight: '1.05', letterSpacing: '-0.035em', fontWeight: '700' }],
              'display-lg': ['3.5rem', { lineHeight: '1.08', letterSpacing: '-0.03em', fontWeight: '700' }],
              'display-md': ['2.5rem', { lineHeight: '1.15', letterSpacing: '-0.025em', fontWeight: '700' }],
              'display-sm': ['1.875rem', { lineHeight: '1.25', letterSpacing: '-0.02em', fontWeight: '700' }],
              'eyebrow': ['0.75rem', { lineHeight: '1.3', letterSpacing: '0.12em', fontWeight: '600' }],
            },
            colors: {
              // Apple system greys
              ink: {
                50: '#FBFBFD',
                100: '#F5F5F7',
                200: '#E8E8ED',
                300: '#D2D2D7',
                400: '#A1A1A6',
                500: '#86868B',
                600: '#6E6E73',
                700: '#3A3A3C',
                800: '#1D1D1F',
                900: '#0D0D0E',
              },
              // 따뜻한 액센트 (Airbnb 감성 테라코타)
              warm: {
                50: '#FDF6F1',
                100: '#FAECE1',
                200: '#F3D4BF',
                300: '#EBB99A',
                400: '#DE9871',
                500: '#C6462C',  // primary warm accent
                600: '#A93A23',
                700: '#86301F',
                800: '#6B281E',
                900: '#53211B',
              },
              // Airbnb 시그니처 핑크 (하트/좋아요 등 포인트)
              coral: {
                500: '#E11C4C',
                600: '#CC1642',
              },
              // Apple 링크 블루
              linkblue: '#0066CC',
            },
            boxShadow: {
              // Airbnb-style soft multilayer shadows
              'card': '0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06)',
              'card-hover': '0 4px 8px rgba(0,0,0,0.06), 0 20px 40px rgba(0,0,0,0.12)',
              'hairline': 'inset 0 -1px 0 #E8E8ED',
            },
            transitionTimingFunction: {
              'apple': 'cubic-bezier(0.28, 0.11, 0.32, 1)',
            },
          },
        },
      };
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: #FBFBFD;
        color: #1D1D1F;
        transition: background-color 300ms cubic-bezier(0.28, 0.11, 0.32, 1);
        word-break: keep-all;
        overflow-wrap: break-word;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .dark body { background: #0D0D0E; color: #F5F5F7; }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }

      /* Airbnb-style subtle scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); background-clip: content-box; }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); background-clip: content-box; }

      /* 선택 영역도 브랜드 색으로 */
      ::selection { background: #FAECE1; color: #1D1D1F; }
      .dark ::selection { background: #6B281E; color: #F5F5F7; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "vite": "https://aistudiocdn.com/vite@^7.2.4",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
