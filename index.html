<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4506641403145765"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-4506641403145765">
    <title>엔지니어를 위한 이야기 공장 — 조남호 (namojo)</title>
    <meta name="description" content="AI 기술에 인문학의 온기를 불어넣다. 2024년부터 기록해온 AI 뉴스 평론과 인문학적 IT기술론." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Pretendard (Apple SF Pro 대체, 한글 최적) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <!-- Noto Serif KR (장문 본문용) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
      }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: #FBFBFD;
        color: #1D1D1F;
        transition: background-color 300ms cubic-bezier(0.28, 0.11, 0.32, 1);
        word-break: keep-all;
        overflow-wrap: break-word;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .dark body { background: #0D0D0E; color: #F5F5F7; }

      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }

      /* Airbnb-style subtle scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); background-clip: content-box; }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); background-clip: content-box; }

      /* 선택 영역도 브랜드 색으로 */
      ::selection { background: #FAECE1; color: #1D1D1F; }
      .dark ::selection { background: #6B281E; color: #F5F5F7; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "vite": "https://aistudiocdn.com/vite@^7.2.4",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
